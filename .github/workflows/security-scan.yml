name: 🔐 Security & Compliance Scan

on:
  pull_request:
    branches: [develop, qa, staging, main]
  push:
    branches: [develop, qa, staging, main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6 AM UTC

jobs:
  security-scan:
    name: 🔐 Full Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Dependency vulnerabilities ──
      - name: 📋 Audit npm/pnpm dependencies
        shell: bash
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            npx pnpm audit --audit-level=high || true
          elif [ -f "package-lock.json" ]; then
            npm audit --audit-level=high || true
          fi

      - name: 🚨 Check for known vulnerabilities (Socket.dev)
        if: false
        run: echo "Socket.dev action requires npm install @socketdev/action — skipping pending setup"

      # ── Secrets scan (deep) ──
      - name: 🕵️ Deep secrets scan (truffleHog)
        continue-on-error: true
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          extra_args: --results=verified,failed --since-commit HEAD~5

      - name: 🛡️ Gitleaks full scan
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── SAST (Static Analysis) ──
      - name: 🧬 CodeQL Initialization
        continue-on-error: true
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript

      - name: 🧬 CodeQL Analysis
        continue-on-error: true
        uses: github/codeql-action/analyze@v3

      # ── Infrastructure as Code scanning ──
      - name: 🏗️ Checkov IaC scan
        continue-on-error: true
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: docker,kubernetes,github_actions
          skip_check: CKV_DOCKER_2,CKV2_DOCKER_1  # Allow latest tag in dev

      # ── Dockerfile linting ──
      - name: 🐳 Hadolint Dockerfile lint
        continue-on-error: true
        uses: hadolint/hadolint-action@v2.1.0
        with:
          dockerfile: docker/Dockerfile

      # ── Report ──
      - name: 📊 Generate Security Report
        if: always()
        shell: bash
        run: |
          echo "## 🔐 Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Scan | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL SAST | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IaC Scan (Checkov) | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfile Lint | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
