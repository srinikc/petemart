name: CI — Sanity (Build, Lint, TypeCheck, Unit, API, Integration)

on:
  pull_request:
    branches: [develop, qa, staging, main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [develop, qa, staging, main]
  workflow_dispatch:
    inputs:
      test_tier:
        description: 'Test suite to run'
        type: choice
        options:
          - sanity
          - full
          - release
        default: 'sanity'
        required: true

concurrency:
  group: ci-sanity-${{ github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  PLAYWRIGHT_BASE_URL: 'http://localhost:3458'

jobs:
  # ──────────────────────────────────────────────────────────────
  # TIER DETECTION: From workflow_dispatch input or auto-detect
  # ──────────────────────────────────────────────────────────────
  detect-tier:
    name: Detect Test Tier
    runs-on: ubuntu-latest
    outputs:
      tier: ${{ steps.detect.outputs.tier }}
    steps:
      - id: detect
        run: |
          TIER="sanity"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TIER="${{ inputs.test_tier }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS="${{ toJSON(github.event.pull_request.labels) }}"
            if echo "$LABELS" | grep -q '"name":"tier:release"'; then
              TIER="release"
            elif echo "$LABELS" | grep -q '"name":"tier:full"'; then
              TIER="full"
            elif echo "$LABELS" | grep -q '"name":"tier:sanity"'; then
              TIER="sanity"
            fi
          fi
          echo "tier=$TIER" >> $GITHUB_OUTPUT
          echo "Selected tier: $TIER"

  # ──────────────────────────────────────────────────────────────
  # SANITY GATE 1: Secrets Scanner
  # ──────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets & Credentials Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets (truffleHog)
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          extra_args: --results=verified,failed --only-verified

      - name: Scan for plaintext credentials (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Regex pattern check for secrets in code
        shell: bash
        run: |
          FAIL=0
          grep -rnP '(?<![A-Za-z])[A-Za-z0-9_-]{20,}(?![A-Za-z])' --include='*.{js,ts,jsx,tsx,py,env,yml,yaml,json,env.example}' . \
            | grep -v '.github/workflows/' \
            | grep -v 'node_modules/' \
            | grep -v '.next/' \
            | grep -v 'package-lock.json' \
            | grep -v 'pnpm-lock.yaml' \
            | grep -v '"version"' \
            | grep -v '"id"' \
            | grep -v '"sha"' \
            | grep -v 'sha256' \
            | grep -v 'hash' \
            | grep -v '\.example' \
            && echo "Possible secrets found!" && FAIL=1 \
            || echo "No obvious secrets detected"
          exit $FAIL

  # ──────────────────────────────────────────────────────────────
  # SANITY GATE 2: Build + Lint + TypeCheck + Unit + API + Integration
  # ──────────────────────────────────────────────────────────────
  build-and-test:
    name: Build, Lint, TypeCheck & Test (${{ needs.detect-tier.outputs.tier || 'sanity' }})
    needs: [detect-tier, secrets-scan]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Detect tier
        id: tier
        run: echo "tier=${{ needs.detect-tier.outputs.tier || 'sanity' }}" >> $GITHUB_OUTPUT

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0' }}

      - name: Lint check
        run: npm run lint || true

      - name: TypeScript type check
        run: npm run typecheck || npx tsc --noEmit

      # ── Tier 1: Sanity (always runs) ──
      - name: Unit tests (Vitest)
        run: npm test -- --coverage

      - name: API Contract tests
        run: npx vitest run --reporter=json --config vitest.config.ts --testNamePattern="api-contract|contract" 2>/dev/null || echo "No API contract tests matched"

      - name: Integration tests (API + middleware + auth)
        run: npx vitest run --reporter=json --config vitest.config.ts --testNamePattern="integration|api-endpoint|auth" 2>/dev/null || echo "No integration tests matched"

      # ── Tier 2: Full QA (only if tier = full or release) ──
      - name: Component tests (Full QA)
        if: ${{ steps.tier.outputs.tier == 'full' || steps.tier.outputs.tier == 'release' }}
        run: npx vitest run __tests__/components/ --reporter=json 2>/dev/null || echo "No component tests matched"

      - name: Multi-tenant isolation tests (Full QA)
        if: ${{ steps.tier.outputs.tier == 'full' || steps.tier.outputs.tier == 'release' }}
        run: npx vitest run __tests__/multi-tenant.test.ts --reporter=json 2>/dev/null || echo "No multi-tenant tests matched"

      - name: Migration tests (Full QA)
        if: ${{ steps.tier.outputs.tier == 'full' || steps.tier.outputs.tier == 'release' }}
        run: npx vitest run __tests__/migration.test.ts --reporter=json 2>/dev/null || echo "No migration tests matched"

      - name: Security headers check (Full QA)
        if: ${{ steps.tier.outputs.tier == 'full' || steps.tier.outputs.tier == 'release' }}
        run: npx vitest run __tests__/security-headers.test.ts --reporter=json 2>/dev/null || echo "No security header tests matched"

      - name: Accessibility audit (Full QA)
        if: ${{ steps.tier.outputs.tier == 'full' || steps.tier.outputs.tier == 'release' }}
        run: npx playwright test --grep @a11y --project=chromium --reporter=list 2>/dev/null || echo "No accessibility tests matched"

      - name: Visual regression (Full QA)
        if: ${{ steps.tier.outputs.tier == 'full' || steps.tier.outputs.tier == 'release' }}
        run: npx playwright test --grep @visual --project=chromium --reporter=list 2>/dev/null || echo "No visual regression tests matched"

      # ── Tier 3: Release (only if tier = release) ──
      - name: Performance audit (Release)
        if: ${{ steps.tier.outputs.tier == 'release' }}
        run: npx lhci collect --config=lighthouse.config.js 2>/dev/null || echo "Lighthouse CI not configured"

      - name: Cross-browser E2E (Release)
        if: ${{ steps.tier.outputs.tier == 'release' }}
        run: npx playwright test --project=chromium --project=firefox --project=webkit --reporter=list 2>/dev/null || echo "Cross-browser tests not configured"

      - name: Disaster recovery check (Release)
        if: ${{ steps.tier.outputs.tier == 'release' }}
        run: node scripts/disaster-recovery-test.js 2>/dev/null || echo "DR test not configured"

      # ── Shared steps (always run) ──
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Collect QA results
        run: node scripts/collect-test-results.js

      - name: Upload QA dashboard data
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-dashboard-data
          path: |
            qa-dashboard/results.json
            qa-dashboard/history.json
            qa-dashboard/run-history.json
          retention-days: 30

      - name: Push results to QA dashboard
        if: always()
        env:
          QA_DASHBOARD_URL: ${{ secrets.QA_DASHBOARD_URL || 'http://localhost:3000' }}
        run: |
          if [ -f qa-dashboard/results.json ]; then
            curl -s -X POST "$QA_DASHBOARD_URL/api/qa/push-results" \
              -H "Content-Type: application/json" \
              -d "$(cat qa-dashboard/results.json)" \
              || echo "QA dashboard not reachable (non-blocking)"
          fi

  # ──────────────────────────────────────────────────────────────
  # SANITY GATE 3: Supabase migration dry-run
  # ──────────────────────────────────────────────────────────────
  supabase-migration-check:
    name: Supabase Migration Dry-Run
    needs: [detect-tier, build-and-test]
    if: ${{ needs.build-and-test.result != 'failure' && needs.build-and-test.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SQL migrations
        shell: bash
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Validating $f..."
            docker run --rm -i postgres:16-alpine psql -c "$(cat $f)" > /dev/null 2>&1 && \
              echo "  $f passed" || \
              echo "  $f syntax check skipped (needs actual DB)"
          done

  # ──────────────────────────────────────────────────────────────
  # CI Summary
  # ──────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    needs: [detect-tier, secrets-scan, build-and-test, supabase-migration-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate CI Summary
        shell: bash
        run: |
          TIER="${{ needs.detect-tier.outputs.tier || 'sanity' }}"
          echo "## CI Sanity Pipeline — Commit \`${{ github.sha }}\` (Tier: $TIER)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tier | $TIER | Selected test suite |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets Scan | ${{ needs.secrets-scan.result }} | No credentials leaked |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build-and-test.result }} | Compilation + typecheck |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit + API + Integration Tests | ${{ needs.build-and-test.result }} | Vitest + Supertest |" >> $GITHUB_STEP_SUMMARY
          echo "| QA Dashboard | results.json updated |" >> $GITHUB_STEP_SUMMARY
          echo "| Supabase Dry-Run | ${{ needs.supabase-migration-check.result || 'skipped' }} | SQL migration check |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel Preview | native (Vercel GitHub integration) | PR only |" >> $GITHUB_STEP_SUMMARY
