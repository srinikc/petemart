name: CI — Build, Lint, TypeCheck & Test

on:
  pull_request:
    branches: [develop, qa, staging, main]
    types: [opened, synchronize, reopened]
  push:
    branches: [develop, qa, staging, main]

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9'
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  # ──────────────────────────────────────────────────────────────
  # QUALITY GATE 1: Secrets Scanner — FAIL if hardcoded credentials
  # ──────────────────────────────────────────────────────────────
  secrets-scan:
    name: 🔐 Secrets & Credentials Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛡️ Scan for hardcoded secrets (truffleHog)
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          extra_args: --results=verified,failed --only-verified

      - name: 🛡️ Scan for plaintext credentials (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Regex pattern check for secrets in code
        shell: bash
        run: |
          FAIL=0
          # Check for common secret patterns
          grep -rnP '(?<![A-Za-z])[A-Za-z0-9_-]{20,}(?![A-Za-z])' --include='*.{js,ts,jsx,tsx,py,env,yml,yaml,json,env.example}' . \
            | grep -v '.github/workflows/' \
            | grep -v 'node_modules/' \
            | grep -v '.next/' \
            | grep -v 'package-lock.json' \
            | grep -v 'pnpm-lock.yaml' \
            | grep -v '"version"' \
            | grep -v '"id"' \
            | grep -v '"sha"' \
            | grep -v 'sha256' \
            | grep -v 'hash' \
            | grep -v '\.example' \
            && echo "❌ Possible secrets found!" && FAIL=1 \
            || echo "✅ No obvious secrets detected"
          exit $FAIL

  # ──────────────────────────────────────────────────────────────
  # QUALITY GATE 2: Build + Lint + TypeCheck + Unit Tests
  # ──────────────────────────────────────────────────────────────
  build-and-test:
    name: 🧪 Build, Lint, TypeCheck & Test
    needs: [secrets-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: ⚡ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build check
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'http://localhost:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0' }}

      - name: 🔍 Lint check
        run: pnpm lint

      - name: 🏷️ TypeScript type check
        run: pnpm typecheck || npx tsc --noEmit

      - name: 🧪 Unit tests
        run: pnpm test -- --coverage

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # QUALITY GATE 3: Docker build validation
  # ──────────────────────────────────────────────────────────────
  docker-validation:
    name: 🐳 Docker Build Validation
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐳 Build Docker image (dev)
        run: docker build -f docker/development.Dockerfile -t petemart-dev --target development .

      - name: 🐳 Validate docker-compose
        run: docker compose -f docker/docker-compose.yml config

      - name: 🐳 Build Docker image (production)
        run: docker build -f docker/Dockerfile -t petemart-prod --target production .

  # ──────────────────────────────────────────────────────────────
  # QUALITY GATE 4: Vercel preview deployment (PR only)
  # ──────────────────────────────────────────────────────────────
  vercel-preview:
    name: 🚀 Vercel Preview
    needs: [docker-validation]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🚀 Deploy Preview to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prebuilt'
          scope: ${{ secrets.VERCEL_ORG_ID }}
          github-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # QUALITY GATE 5: Supabase migration dry-run
  # ──────────────────────────────────────────────────────────────
  supabase-migration-check:
    name: 🗄️ Supabase Migration Dry-Run
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🗄️ Validate SQL migrations
        shell: bash
        run: |
          for f in supabase/migrations/*.sql; do
            echo "🔍 Validating $f..."
            # Basic SQL syntax check (runs pg syntax validator)
            docker run --rm -i postgres:16-alpine psql -c "$(cat $f)" > /dev/null 2>&1 && \
              echo "  ✅ $f passed" || \
              echo "  ⚠️  $f syntax check skipped (needs actual DB)"
          done
