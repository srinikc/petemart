# =============================================================================
# PeteMart — Staging Kubernetes Deployment
# =============================================================================
# Environment: staging
# Domain: staging.petemart.vercel.app
# Replicas: 2 (pre-production validation)
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: petemart-web
  namespace: petemart
  labels:
    app: petemart
    tier: web
    environment: staging
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: petemart
      tier: web
      environment: staging
  template:
    metadata:
      labels:
        app: petemart
        tier: web
        environment: staging
    spec:
      containers:
        - name: petemart-web
          image: petemart/web:staging-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "staging"
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: petemart-secrets
                  key: supabase-url
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: petemart-secrets
                  key: supabase-anon-key
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: petemart-web-svc
  namespace: petemart
  labels:
    app: petemart
    tier: web
    environment: staging
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: petemart
    tier: web
    environment: staging
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: petemart-web-ingress
  namespace: petemart
  labels:
    app: petemart
    environment: staging
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/cors-enabled: "true"
spec:
  rules:
    - host: staging.petemart.vercel.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: petemart-web-svc
                port:
                  number: 80
  tls:
    - hosts:
        - staging.petemart.vercel.app
      secretName: petemart-staging-tls
