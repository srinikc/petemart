sonar.projectKey=petemart
sonar.organization=petemart-org
sonar.projectName=PeteMart
sonar.projectVersion=1.0.0

sonar.sources=.
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/*.test.*,**/*.config.*,**/.opencode/**,**/.git/**

sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.*,**/*.config.*,**/node_modules/**

sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true

sonar.javascript.environments=node, browser, es2022
sonar.typescript.environments=node, browser, es2022
